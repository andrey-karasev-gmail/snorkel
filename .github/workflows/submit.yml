name: Submit to Snorkel

on:
  workflow_dispatch:
    inputs:
      time:
        description: "Time spent on task (minutes)"
        required: true
        default: "0"
      project:
        description: "Snorkel project name (required for first submission; ignored if .snorkel_config exists)"
        required: false
      send_to_reviewer:
        description: "Send to reviewer after evaluation"
        type: boolean
        default: true
      dry_run:
        description: "Dry run (package ZIP without uploading)"
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          MISSING=0
          for f in task.toml instruction.md environment/Dockerfile solution/solve.sh tests/test.sh tests/test_outputs.py; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              MISSING=1
            else
              echo "✅ $f"
            fi
          done
          exit $MISSING

      - name: Validate task.toml fields
        run: |
          python3 - <<'EOF'
          import sys
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          with open("task.toml", "rb") as f:
              config = tomllib.load(f)

          errors = []
          meta = config.get("metadata", {})

          difficulty = meta.get("difficulty", "")
          if difficulty not in ("easy", "medium", "hard", "unknown"):
              errors.append(f"❌ Invalid difficulty '{difficulty}' (must be easy, medium, hard, or unknown)")
          else:
              print(f"✅ difficulty = {difficulty}")

          category = meta.get("category", "")
          if not category:
              errors.append("❌ Missing category")
          elif category in ("software-engineering", "debugging"):
              errors.append(f"❌ Category '{category}' is blocked for this project")
          else:
              print(f"✅ category = {category}")

          subcategories = meta.get("subcategories", [])
          if not subcategories:
              errors.append("❌ Missing subcategories")
          else:
              print(f"✅ subcategories = {subcategories}")

          for field in ("author_name", "author_email", "codebase_size", "languages"):
              if not meta.get(field):
                  errors.append(f"❌ Missing metadata.{field}")
              else:
                  print(f"✅ {field} = {meta[field]}")

          verifier = config.get("verifier", {})
          if not verifier.get("timeout_sec"):
              errors.append("❌ Missing verifier.timeout_sec")

          agent = config.get("agent", {})
          if not agent.get("timeout_sec"):
              errors.append("❌ Missing agent.timeout_sec")

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          EOF

      - name: Ruff lint
        run: |
          pip install ruff --quiet
          ruff check tests/test_outputs.py

      - name: Check solve.sh shebang
        run: |
          SHEBANG=$(head -1 solution/solve.sh)
          if echo "$SHEBANG" | grep -q "bash"; then
            echo "✅ solve.sh uses bash"
          else
            echo "⚠️  solve.sh shebang: $SHEBANG (recommend #!/usr/bin/env bash)"
          fi

  submit:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install STB
        run: uv tool install snorkelai-stb --find-links https://snorkel-python-wheels.s3.us-west-2.amazonaws.com/stb/index.html

      - name: Configure STB environment
        run: |
          mkdir -p ~/.config/stb
          printf '[auth]\nenv = prod\n' > ~/.config/stb/config.ini

      - name: Submit to Snorkel
        env:
          SNORKEL_API_KEY: ${{ secrets.SNORKEL_API_KEY }}
        run: |
          FLAG=""
          if [ "${{ inputs.send_to_reviewer }}" = "false" ]; then
            FLAG="--no-send-to-reviewer"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAG="$FLAG --dry-run"
          fi

          if [ -f ".snorkel_config" ]; then
            stb submissions update . --time ${{ inputs.time }} $FLAG
          else
            if [ -z "${{ inputs.project }}" ]; then
              echo "ERROR: .snorkel_config not found and no project name provided."
              exit 1
            fi
            stb submissions create . --project-name "${{ inputs.project }}" --time ${{ inputs.time }} $FLAG
          fi
